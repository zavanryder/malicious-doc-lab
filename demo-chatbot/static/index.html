<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>maldoc Demo-Chatbot</title>
<style>
  :root {
    --bg-dark: #1a1a2e;
    --bg-chat: #f5f5f5;
    --bg-user: #4a6cf7;
    --bg-assistant: #ffffff;
    --text-light: #ffffff;
    --text-dark: #333333;
    --text-muted: #888888;
    --border: #e0e0e0;
    --shadow: rgba(0, 0, 0, 0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: var(--bg-chat);
  }

  /* Header */
  .header {
    background: var(--bg-dark);
    color: var(--text-light);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .header h1 {
    font-size: 18px;
    font-weight: 600;
  }

  .header-subtitle {
    font-size: 12px;
    color: var(--text-muted);
  }

  .reset-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.3);
    color: var(--text-light);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }

  .reset-btn:hover { border-color: rgba(255,255,255,0.6); }

  /* Chat area */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .message {
    max-width: 70%;
    padding: 12px 16px;
    border-radius: 16px;
    line-height: 1.5;
    font-size: 14px;
    box-shadow: 0 1px 3px var(--shadow);
    word-wrap: break-word;
    white-space: pre-wrap;
  }

  .message.user {
    align-self: flex-end;
    background: var(--bg-user);
    color: var(--text-light);
    border-bottom-right-radius: 4px;
  }

  .message.assistant {
    align-self: flex-start;
    background: var(--bg-assistant);
    color: var(--text-dark);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .file-chip {
    display: inline-block;
    background: rgba(255,255,255,0.2);
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 12px;
    margin-bottom: 6px;
  }

  .message.assistant .file-chip {
    background: rgba(74,108,247,0.1);
    color: var(--bg-user);
  }

  /* Typing indicator */
  .typing {
    align-self: flex-start;
    padding: 12px 16px;
    background: var(--bg-assistant);
    border: 1px solid var(--border);
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    display: none;
  }

  .typing span {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: var(--text-muted);
    border-radius: 50%;
    margin: 0 2px;
    animation: bounce 1.4s infinite ease-in-out;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }

  /* Input area */
  .input-area {
    flex-shrink: 0;
    padding: 16px 20px;
    background: #ffffff;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .file-input-wrapper {
    position: relative;
    cursor: pointer;
    flex-shrink: 0;
  }

  .file-input-wrapper input {
    position: absolute;
    opacity: 0;
    width: 100%;
    height: 100%;
    cursor: pointer;
  }

  .file-icon {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: var(--bg-chat);
    color: var(--text-muted);
    font-size: 18px;
    transition: background 0.2s;
  }

  .file-icon:hover { background: var(--border); }
  .file-icon.has-file { background: var(--bg-user); color: var(--text-light); }

  .text-input {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 10px 16px;
    font-size: 14px;
    outline: none;
    font-family: inherit;
    resize: none;
    max-height: 120px;
    line-height: 1.4;
  }

  .text-input:focus { border-color: var(--bg-user); }

  .send-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: none;
    background: var(--bg-user);
    color: var(--text-light);
    font-size: 18px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .file-preview {
    padding: 6px 20px 0;
    background: #ffffff;
    font-size: 13px;
    color: var(--text-muted);
    display: none;
    align-items: center;
    gap: 8px;
  }

  .file-preview .remove {
    cursor: pointer;
    color: #cc0000;
    font-weight: bold;
  }
</style>
</head>
<body>
  <div class="header">
    <div>
      <h1>maldoc Demo-Chatbot</h1>
      <div class="header-subtitle">Intentionally vulnerable -- for security testing only</div>
    </div>
    <button class="reset-btn" id="resetBtn" onclick="resetChat()">Reset</button>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="typing" id="typing">
      <span></span><span></span><span></span>
    </div>
  </div>

  <div class="file-preview" id="filePreview">
    <span id="filePreviewName"></span>
    <span class="remove" onclick="clearFile()">x</span>
  </div>

  <div class="input-area">
    <div class="file-input-wrapper">
      <div class="file-icon" id="fileIcon" title="Attach a file">&#x1F4CE;</div>
      <input type="file" id="fileInput" onchange="onFileSelect(this)">
    </div>
    <textarea class="text-input" id="textInput" placeholder="Type a message..."
              rows="1" onkeydown="onKeyDown(event)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">&#x27A4;</button>
  </div>

<script>
const chatArea = document.getElementById("chatArea");
const textInput = document.getElementById("textInput");
const fileInput = document.getElementById("fileInput");
const fileIcon = document.getElementById("fileIcon");
const filePreview = document.getElementById("filePreview");
const filePreviewName = document.getElementById("filePreviewName");
const typing = document.getElementById("typing");
const sendBtn = document.getElementById("sendBtn");
const resetBtn = document.getElementById("resetBtn");

let sending = false;

// Load history on page open
async function loadHistory() {
  try {
    const res = await fetch("/history");
    const data = await res.json();
    for (const msg of data.messages || []) {
      appendMessage(msg.role, msg.content);
    }
  } catch (e) {
    // History endpoint may not be available
  }
}

// Check if reset endpoint exists (hidden in black-box mode)
async function checkReset() {
  try {
    const res = await fetch("/reset", { method: "POST" });
    if (res.status === 404 || res.status === 405) {
      resetBtn.style.display = "none";
    }
    // If it worked, we just reset -- reload history
    // Actually, just hide/show the button; don't reset on load
  } catch (e) {
    resetBtn.style.display = "none";
  }
}

// We only want to probe the endpoint, not actually reset. Use OPTIONS or just leave button visible.
// Simpler: always show reset, handle 404 in resetChat().

function appendMessage(role, content) {
  const div = document.createElement("div");
  div.className = `message ${role === "user" ? "user" : "assistant"}`;
  div.textContent = content;
  chatArea.insertBefore(div, typing);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function onFileSelect(input) {
  if (input.files.length > 0) {
    fileIcon.classList.add("has-file");
    filePreview.style.display = "flex";
    filePreviewName.textContent = input.files[0].name;
  }
}

function clearFile() {
  fileInput.value = "";
  fileIcon.classList.remove("has-file");
  filePreview.style.display = "none";
  filePreviewName.textContent = "";
}

function onKeyDown(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
  // Auto-resize textarea
  setTimeout(() => {
    textInput.style.height = "auto";
    textInput.style.height = Math.min(textInput.scrollHeight, 120) + "px";
  }, 0);
}

async function sendMessage() {
  if (sending) return;

  const text = textInput.value.trim();
  const file = fileInput.files[0] || null;

  if (!text && !file) return;

  // Build display text
  let display = text;
  if (file) {
    const label = `[${file.name}]`;
    display = text ? `${label} ${text}` : label;
  }

  appendMessage("user", display);

  textInput.value = "";
  textInput.style.height = "auto";
  clearFile();

  sending = true;
  sendBtn.disabled = true;
  typing.style.display = "block";
  chatArea.scrollTop = chatArea.scrollHeight;

  try {
    const formData = new FormData();
    formData.append("message", text);
    if (file) formData.append("file", file);

    const res = await fetch("/chat", { method: "POST", body: formData });
    const data = await res.json();
    appendMessage("assistant", data.content);
  } catch (e) {
    appendMessage("assistant", "Error: Could not reach the server.");
  } finally {
    sending = false;
    sendBtn.disabled = false;
    typing.style.display = "none";
  }
}

async function resetChat() {
  try {
    const res = await fetch("/reset", { method: "POST" });
    if (res.ok) {
      // Clear UI
      const messages = chatArea.querySelectorAll(".message");
      messages.forEach(m => m.remove());
    } else if (res.status === 404) {
      // Black-box mode: reset not available
      resetBtn.style.display = "none";
    }
  } catch (e) {
    // Ignore errors
  }
}

loadHistory();
</script>
</body>
</html>
